<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notorious | 伺服器硬舉中</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --brand-red: #FF0000;
            --vital-yellow: #FFD700; /* 活力黃 */
            --mc-skin: #FFCD94;
            --mc-tattoo: rgba(60, 60, 60, 0.7);
        }
        
        html, body {
            background-color: #000000 !important;
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: grid; place-items: center; overflow: hidden;
        }

        .container {
            position: relative;
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 4px solid var(--brand-red);
            border-radius: 30px; padding: 40px; width: 90%; max-width: 550px;
            text-align: center; box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
            z-index: 100; transition: all 0.3s ease;
        }

        h1 { font-size: 3.2rem; color: var(--brand-red); margin: 0; font-weight: 900; letter-spacing: 2px; }
        
        /* 活力黃文字區域 */
        #gym-quote { 
            font-size: 1.9rem; font-weight: 900; 
            margin: 20px 0 10px 0; min-height: 50px; 
            color: var(--vital-yellow); 
            display: flex; align-items: center; justify-content: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(255, 215, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .failure-text {
            color: #FFF000 !important;
            text-shadow: 0 0 20px #FFD700, 0 0 40px #FF4500 !important;
            transform: scale(1.1);
            animation: textShake 0.1s infinite;
        }

        @keyframes textShake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
            100% { transform: translateX(0); }
        }

        .sub-text { font-size: 1.1rem; color: #aaa; margin-bottom: 20px; }

        /* 麥塊小人與刺青手臂 */
        .animation-scene {
            width: 200px; height: 150px; margin: 20px auto;
            position: relative; animation: squat 1.2s ease-in-out infinite;
        }
        .mc-part { position: absolute; background-color: var(--mc-skin); }
        .head { width: 42px; height: 42px; top: 0; left: 79px; box-shadow: inset 0 10px #333, inset 0 -8px #333; }
        .body { width: 42px; height: 55px; top: 42px; left: 79px; background-color: #000; border: 1px solid #444; }
        .arm { 
            width: 20px; height: 50px; top: 42px; 
            background-image: 
                repeating-linear-gradient(45deg, var(--mc-tattoo) 25%, transparent 25%, transparent 75%, var(--mc-tattoo) 75%, var(--mc-tattoo)),
                repeating-linear-gradient(-45deg, var(--mc-tattoo) 25%, transparent 25%, transparent 75%, var(--mc-tattoo) 75%, var(--mc-tattoo));
            background-size: 6px 6px;
        }
        .arm.l { left: 59px; } .arm.r { left: 121px; }
        .barbell { width: 260px; height: 10px; background: #888; position: absolute; top: 32px; left: -30px; z-index: 10; }
        .weight { width: 30px; height: 80px; background: #222; border: 1px solid #555; position: absolute; top: -35px; }
        .weight.l { left: 0; } .weight.r { right: 0; }

        @keyframes squat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(30px); } }

        .progress-box { width: 100%; height: 25px; background: #333; border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
        #bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #900, #f00); transition: width 1s linear; }
        .btn { background: none; color: white; border: 2px solid white; padding: 12px 35px; border-radius: 12px; font-size: 1.2rem; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: white; color: black; }
        .failure-mode { animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 30px rgba(255,0,0,0.3); } 50% { box-shadow: 0 0 80px rgba(255,0,0,0.7); border-color: #ff5555; } 100% { box-shadow: 0 0 30px rgba(255,0,0,0.3); } }
    </style>
</head>
<body>
    <div class="container" id="main-box">
        <h1>NOTORIOUS</h1>
        <div id="gym-quote">正在暖身中...</div>
        <div class="sub-text">伺服器正在練腿，請稍候</div>
        <div class="animation-scene">
            <div class="barbell"><div class="weight l"></div><div class="weight r"></div></div>
            <div class="mc-part head"></div>
            <div class="mc-part body"></div>
            <div class="mc-part arm l"></div>
            <div class="mc-part arm r"></div>
        </div>
        <div class="progress-box"><div id="bar-fill"></div></div>
        <p style="font-size: 1.2rem; margin-bottom: 25px;">預計 <span id="timer" style="color:#f00; font-weight:bold;">30</span> 秒後自動重整</p>
        <button class="btn" onclick="location.reload()">手動重整</button>
    </div>
    <script>
        let sec = 30;
        const bar = document.getElementById('bar-fill');
        const txt = document.getElementById('timer');
        const quote = document.getElementById('gym-quote');
        const box = document.getElementById('main-box');
        function getQuote(s) {
            if (s > 22) return "還有 4 組，撐住！";
            if (s > 15) return "還有 3 組，動作不要跑掉！";
            if (s > 8)  return "還有 2 組，這組做完換你！";
            if (s > 3)  return "最後 1 組！力竭！力竭！";
            return "補位完成，準備進場！";
        }
        setInterval(() => {
            if(sec > 0) {
                sec--;
                txt.innerText = sec;
                bar.style.width = ((30 - sec) / 30 * 100) + '%';
                quote.innerText = getQuote(sec);
                if (sec <= 5) {
                    box.classList.add('failure-mode');
                    quote.classList.add('failure-text');
                }
            } else { location.reload(); }
        }, 1000);
    </script>
</body>
</html>
