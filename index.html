<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notorious | 伺服器硬舉中</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --current-color: #00FFCC; /* 初始動態顏色 */
            --mc-skin: #FFCD94;       /* 皮膚色 */
            --mc-skin-blush: #FFACAC; /* 腮紅色 */
            --mc-eye-pupil: #222;     /* 瞳孔色 */
            --mc-eye-white: #fff;     /* 眼白色 */
            --mc-tattoo: rgba(60, 60, 60, 0.6); /* 刺青色 */
        }
        
        html, body {
            background-color: #000000 !important;
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: grid; place-items: center; overflow: hidden;
            transition: background-color 0.1s;
        }

        /* 1. 主容器：霓虹霓虹 */
        .container {
            position: relative;
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 5px solid var(--current-color);
            border-radius: 35px; padding: 50px; width: 90%; max-width: 580px;
            text-align: center; 
            z-index: 100; 
            transition: border-color 0.5s;
            animation: borderBreath 2s infinite alternate ease-in-out;
        }

        @keyframes borderBreath {
            from { box-shadow: 0 0 15px var(--current-color); }
            to { box-shadow: 0 0 45px var(--current-color); }
        }

        h1 { font-size: 3.5rem; color: #FF0000; margin: 0; font-weight: 900; letter-spacing: 4px; text-shadow: 2px 2px #000; }
        
        #gym-quote { 
            font-size: 2.2rem; font-weight: 900; 
            margin: 25px 0 15px 0; min-height: 100px; 
            color: var(--current-color); 
            display: flex; align-items: center; justify-content: center;
            text-shadow: 0 0 15px var(--current-color);
            transition: color 0.4s;
        }

        .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 3. 【Q 版比例】麥塊小人 CSS 優化區域 */
        .animation-scene {
            width: 220px; height: 180px;
            margin: 10px auto;
            position: relative; 
            animation: squat 1.2s ease-in-out infinite;
            transform-origin: bottom center;
        }

        @keyframes squat { 
            0%, 100% { transform: translateY(0) scaleY(1); } 
            50% { transform: translateY(30px) scaleY(0.96); } 
        }

        .mc-part { position: absolute; background-color: var(--mc-skin); }

        /* 3a. 大頭與真正的五官 */
        .head { 
            width: 65px; height: 60px;
            top: 0; left: 77.5px;
            box-shadow: inset 0 12px #333, inset 0 -5px rgba(0,0,0,0.1);
            border-radius: 8px;
            z-index: 5;
        }

        /* 瞳孔（::before = 左，::after = 右）*/
        .head::before, .head::after {
            content: ''; position: absolute;
            width: 12px; height: 12px;
            background-color: var(--mc-eye-white);
            top: 25px; /* 眼睛高度 */
            border-radius: 3px;
            background-image: radial-gradient(var(--mc-eye-pupil) 30%, transparent 40%);
        }
        .head::before { left: 10px; }
        .head::after { right: 10px; }

        /* 嘴巴與調整後的腮紅 */
        .head-features {
            position: absolute;
            width: 100%; height: 100%; top: 0; left: 0;
            z-index: 6;
        }

        /* 嘴巴：可愛微笑 */
        .mouth {
            position: absolute;
            width: 18px; height: 6px;
            background: #222;
            bottom: 12px; left: 50%;
            transform: translateX(-50%);
            border-radius: 3px;
        }

        /* 調整後的腮紅：淡淡粉紅 */
        .blush {
            position: absolute;
            width: 12px; height: 8px;
            background-color: var(--mc-skin-blush);
            bottom: 18px; /* 嘴巴上方 */
            border-radius: 4px;
        }
        .blush.l { left: 8px; }
        .blush.r { right: 8px; }

        /* 3b. 縮小身體比例 */
        .body { 
            width: 40px; height: 50px;
            top: 60px; left: 90px;
            background-color: #111; 
            border: 2px solid #333; 
            border-radius: 4px;
            z-index: 4;
        }

        .arm { 
            width: 18px; height: 45px;
            top: 60px; 
            border-radius: 4px;
            background-image: 
                repeating-linear-gradient(45deg, var(--mc-tattoo) 25%, transparent 25%, transparent 75%, var(--mc-tattoo) 75%, var(--mc-tattoo)),
                repeating-linear-gradient(-45deg, var(--mc-tattoo) 25%, transparent 25%, transparent 75%, var(--mc-tattoo) 75%, var(--mc-tattoo));
            background-size: 6px 6px;
            z-index: 3;
        }
        .arm.l { left: 70px; } 
        .arm.r { left: 132px; }

        .barbell { 
            width: 280px; height: 10px;
            background: #888; 
            position: absolute; top: 50px;
            left: -30px; z-index: 10; border-radius: 5px; 
        }
        .weight { 
            width: 35px; height: 100px;
            background: #1a1a1a; 
            border: 2px solid #444; 
            position: absolute; top: -45px;
            border-radius: 4px;
        }
        .weight.l { left: 0; } .weight.r { right: 0; }

        /* 4. 進度條與特效 */
        .progress-box { width: 100%; height: 30px; background: #222; border-radius: 15px; overflow: hidden; margin-bottom: 25px; border: 1px solid #444; }
        #bar-fill { 
            width: 0%; height: 100%; 
            background: var(--current-color);
            box-shadow: 0 0 20px var(--current-color);
            transition: width 1s linear, background 0.5s ease; 
        }

        .btn { 
            background: none; color: white; border: 2px solid white; padding: 15px 40px; 
            border-radius: 15px; font-size: 1.4rem; cursor: pointer; font-weight: bold; transition: 0.3s; 
        }
        .btn:hover { background: #FF0000; border-color: #FF0000; box-shadow: 0 0 20px #FF0000; }

        .failure-active {
            animation: extremeShake 0.15s infinite alternate, colorFlicker 0.1s infinite;
            transform: scale(1.1);
        }
        @keyframes extremeShake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            50% { transform: translate(-2px, -1px) rotate(-1deg); }
            100% { transform: translate(1px, 2px) rotate(1deg); }
        }
        @keyframes colorFlicker {
            0%, 100% { color: #FF0000; text-shadow: 0 0 30px #FF0000; }
            50% { color: #FFFFFF; text-shadow: 0 0 50px #FFFFFF; }
        }
        .bg-vibrate { animation: bgShake 0.1s infinite; }
        @keyframes bgShake {
            0% { background-color: #000; }
            50% { background-color: #1a0000; }
        }
        .sub-text { font-size: 1.2rem; color: #ccc; margin-bottom: 25px; font-weight: 500; }
    </style>
</head>
<body id="bg-body">
    <div class="container" id="main-box">
        <h1>NOTORIOUS</h1>
        <div id="gym-quote">準備開練...</div>
        <div class="sub-text">伺服器組間休息，請稍候</div>
        
        <div class="animation-scene">
            <div class="barbell"><div class="weight l"></div><div class="weight r"></div></div>
            <div class="mc-part head">
                <div class="head-features">
                    <div class="mouth"></div>
                    <div class="blush l"></div>
                    <div class="blush r"></div>
                </div>
            </div>
            <div class="mc-part body"></div>
            <div class="mc-part arm l"></div>
            <div class="mc-part arm r"></div>
        </div>

        <div class="progress-box"><div id="bar-fill"></div></div>
        <p style="font-size: 1.4rem; margin-bottom: 30px;">
            <span id="timer" style="color:#FF0000; font-weight:bold; font-size: 2rem;">30</span> 秒後自動重整
        </p>
        <button class="btn" onclick="location.reload()">手動重整</button>
    </div>

    <script>
        let sec = 30;
        const bar = document.getElementById('bar-fill');
        const txt = document.getElementById('timer');
        const quote = document.getElementById('gym-quote');
        const box = document.getElementById('main-box');
        const body = document.getElementById('bg-body');
        const scene = document.querySelector('.animation-scene');

        const quotes = {
            stage4: ["還有 4 組，撐住！", "這是我 0.1 倍的力量！", "你各位啊，不要偷懶！", "訓練，是為了解脫！"],
            stage3: ["還有 3 組，動作不要跑掉！", "核心收緊，不要憋氣！", "看什麼看？再一組！", "這才剛開始而已！"],
            stage2: ["還有 2 組，這組做完換你！", "漢子，這才是訓練！", "汗水是脂肪的眼淚！", "你如果不努力，誰也幫不了你！"],
            stage1: ["最後 1 組！力竭！力竭！", "超越極限，不要放手！", "全台灣都在看你練！", "撐過去就是你的！"],
            done: ["補位完成，準備進場！", "練完了，硬起來！", "現在，換你上場！"]
        };

        function getRandomQuote(category) {
            const list = quotes[category];
            return list[Math.floor(Math.random() * list.length)];
        }

        function updateStage(s) {
            let info = { type: "", color: "", speed: "1.2s" };
            if (s > 22) { info.type = 'stage4'; info.color = "#00FFCC"; info.speed = "1.2s"; }
            else if (s > 15) { info.type = 'stage3'; info.color = "#CCFF00"; info.speed = "0.9s"; }
            else if (s > 8) { info.type = 'stage2'; info.color = "#FFBB00"; info.speed = "0.65s"; }
            else if (s > 3) { info.type = 'stage1'; info.color = "#FF4400"; info.speed = "0.4s"; }
            else { info.type = 'stage1'; info.color = "#FF0000"; info.speed = "0.2s"; }
            return info;
        }

        const countdown = setInterval(() => {
            if(sec > 0) {
                sec--;
                txt.innerText = sec;
                bar.style.width = ((30 - sec) / 30 * 100) + '%';
                
                const stage = updateStage(sec);
                
                // 文字漸入動畫
                if (sec === 29 || sec === 22 || sec === 15 || sec === 8 || sec === 3) {
                    quote.classList.remove('fade-in-up');
                    void quote.offsetWidth; // 強制重繪
                    quote.innerText = getRandomQuote(stage.type);
                    quote.classList.add('fade-in-up');
                }
                
                document.documentElement.style.setProperty('--current-color', stage.color);
                scene.style.animationDuration = stage.speed;
                
                if (sec <= 5) {
                    box.classList.add('failure-active');
                    body.classList.add('bg-vibrate');
                }
            } else {
                clearInterval(countdown);
                location.reload();
            }
        }, 1000);
    </script>
</body>
</html>
